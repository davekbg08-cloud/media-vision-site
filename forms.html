<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="robots" content="noindex,nofollow"/>
  <title>Formulaires Media Vision</title>
</head>
<body>
  <!-- Fichier statique réservé à la détection automatique Netlify Forms. -->
  <form name="career-application" method="POST" data-netlify="true" netlify-honeypot="bot-field" enctype="multipart/form-data" hidden>
    <input type="hidden" name="form-name" value="career-application"/>
    <input name="bot-field"/>
    <input name="subject"/>
    <input name="prenom" type="text"/>
    <input name="nom" type="text"/>
    <input name="email" type="email"/>
    <input name="telephone" type="tel"/>
    <select name="domaine"><option>Flutter / mobile</option></select>
    <select name="niveau"><option>Débutant</option></select>
    <input name="portfolio" type="url"/>
    <input name="cv" type="file"/>
    <textarea name="message"></textarea>
    <input name="consentement" type="checkbox"/>
  </form>
</body>
</html>
